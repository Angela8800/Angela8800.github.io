<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Sky -->
  <rect width="400" height="400" fill="#E3F2FD"/>
  <!-- Sun -->
  <circle cx="340" cy="60" r="35" fill="#FFD54F"/>
  <g stroke="#FFD54F" stroke-width="3" opacity="0.6">
    <line x1="340" y1="15" x2="340" y2="5"/>
    <line x1="370" y1="30" x2="380" y2="22"/>
    <line x1="385" y1="60" x2="395" y2="60"/>
    <line x1="370" y1="90" x2="380" y2="98"/>
    <line x1="310" y1="30" x2="300" y2="22"/>
    <line x1="295" y1="60" x2="285" y2="60"/>
    <line x1="310" y1="90" x2="300" y2="98"/>
  </g>
  <!-- Rainbow -->
  <path d="M50,200 Q200,40 350,200" fill="none" stroke="#EF5350" stroke-width="6" opacity="0.3"/>
  <path d="M55,200 Q200,50 345,200" fill="none" stroke="#FF9800" stroke-width="6" opacity="0.3"/>
  <path d="M60,200 Q200,60 340,200" fill="none" stroke="#FFEB3B" stroke-width="6" opacity="0.3"/>
  <path d="M65,200 Q200,70 335,200" fill="none" stroke="#4CAF50" stroke-width="6" opacity="0.3"/>
  <path d="M70,200 Q200,80 330,200" fill="none" stroke="#2196F3" stroke-width="6" opacity="0.3"/>
  <!-- Ground -->
  <ellipse cx="200" cy="365" rx="190" ry="35" fill="#66BB6A"/>
  <!-- Flowers -->
  <g fill="#FF80AB" opacity="0.8">
    <circle cx="60" cy="345" r="5"/><circle cx="55" cy="340" r="4"/><circle cx="65" cy="340" r="4"/>
    <circle cx="140" cy="355" r="4"/><circle cx="135" cy="351" r="3"/><circle cx="145" cy="351" r="3"/>
    <circle cx="280" cy="350" r="5"/><circle cx="275" cy="345" r="4"/><circle cx="285" cy="345" r="4"/>
    <circle cx="340" cy="345" r="4"/><circle cx="336" cy="341" r="3"/><circle cx="344" cy="341" r="3"/>
  </g>
  <!-- Brick House - bigger and stronger -->
  <rect x="100" y="160" width="200" height="170" rx="2" fill="#E57373"/>
  <!-- Brick pattern -->
  <g stroke="#C62828" stroke-width="0.8" opacity="0.5">
    <line x1="100" y1="180" x2="300" y2="180"/>
    <line x1="100" y1="200" x2="300" y2="200"/>
    <line x1="100" y1="220" x2="300" y2="220"/>
    <line x1="100" y1="240" x2="300" y2="240"/>
    <line x1="100" y1="260" x2="300" y2="260"/>
    <line x1="100" y1="280" x2="300" y2="280"/>
    <line x1="100" y1="300" x2="300" y2="300"/>
    <!-- Vertical offsets -->
    <line x1="150" y1="160" x2="150" y2="180"/>
    <line x1="200" y1="160" x2="200" y2="180"/>
    <line x1="250" y1="160" x2="250" y2="180"/>
    <line x1="125" y1="180" x2="125" y2="200"/>
    <line x1="175" y1="180" x2="175" y2="200"/>
    <line x1="225" y1="180" x2="225" y2="200"/>
    <line x1="275" y1="180" x2="275" y2="200"/>
    <line x1="150" y1="200" x2="150" y2="220"/>
    <line x1="200" y1="200" x2="200" y2="220"/>
    <line x1="250" y1="200" x2="250" y2="220"/>
    <line x1="125" y1="220" x2="125" y2="240"/>
    <line x1="175" y1="220" x2="175" y2="240"/>
    <line x1="225" y1="220" x2="225" y2="240"/>
    <line x1="275" y1="220" x2="275" y2="240"/>
    <line x1="150" y1="240" x2="150" y2="260"/>
    <line x1="200" y1="240" x2="200" y2="260"/>
    <line x1="250" y1="240" x2="250" y2="260"/>
    <line x1="125" y1="260" x2="125" y2="280"/>
    <line x1="175" y1="260" x2="175" y2="280"/>
    <line x1="225" y1="260" x2="225" y2="280"/>
    <line x1="275" y1="260" x2="275" y2="280"/>
  </g>
  <!-- Roof -->
  <polygon points="80,165 200,80 320,165" fill="#B71C1C" stroke="#880E0E" stroke-width="2"/>
  <!-- Chimney -->
  <rect x="250" y="85" width="30" height="50" rx="2" fill="#C62828"/>
  <!-- Smoke -->
  <circle cx="265" cy="70" r="8" fill="#BDBDBD" opacity="0.5"/>
  <circle cx="275" cy="55" r="10" fill="#BDBDBD" opacity="0.4"/>
  <circle cx="268" cy="40" r="12" fill="#BDBDBD" opacity="0.3"/>
  <!-- Door -->
  <rect x="170" y="260" width="60" height="70" rx="30" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
  <circle cx="218" cy="298" r="5" fill="#FFD54F"/>
  <!-- Windows -->
  <rect x="115" y="195" width="45" height="45" rx="4" fill="#BBDEFB" stroke="#5D4037" stroke-width="2"/>
  <line x1="137.5" y1="195" x2="137.5" y2="240" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="115" y1="217.5" x2="160" y2="217.5" stroke="#5D4037" stroke-width="1.5"/>
  <rect x="240" y="195" width="45" height="45" rx="4" fill="#BBDEFB" stroke="#5D4037" stroke-width="2"/>
  <line x1="262.5" y1="195" x2="262.5" y2="240" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="240" y1="217.5" x2="285" y2="217.5" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Three pigs celebrating -->
  <!-- Pig 1 -->
  <g transform="translate(30, 255)">
    <ellipse cx="25" cy="45" rx="20" ry="18" fill="#FFB6C1"/>
    <circle cx="25" cy="22" r="17" fill="#FFB6C1"/>
    <ellipse cx="13" cy="9" rx="7" ry="9" fill="#FFB6C1" stroke="#FF9CAD" stroke-width="1"/>
    <ellipse cx="37" cy="9" rx="7" ry="9" fill="#FFB6C1" stroke="#FF9CAD" stroke-width="1"/>
    <circle cx="18" cy="20" r="2.5" fill="#333"/>
    <circle cx="32" cy="20" r="2.5" fill="#333"/>
    <circle cx="19" cy="19" r="1" fill="#fff"/>
    <circle cx="33" cy="19" r="1" fill="#fff"/>
    <ellipse cx="25" cy="28" rx="8" ry="6" fill="#FF9CAD"/>
    <circle cx="22" cy="28" r="1.5" fill="#E87D93"/>
    <circle cx="28" cy="28" r="1.5" fill="#E87D93"/>
    <!-- Happy closed eyes smile -->
    <path d="M17,33 Q25,39 33,33" fill="none" stroke="#E87D93" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Arms up celebrating -->
    <path d="M5,38 Q-5,20 0,10" fill="none" stroke="#FFB6C1" stroke-width="7" stroke-linecap="round"/>
    <path d="M45,38 Q55,20 50,10" fill="none" stroke="#FFB6C1" stroke-width="7" stroke-linecap="round"/>
    <rect x="12" y="60" width="9" height="13" rx="4" fill="#FFB6C1"/>
    <rect x="29" y="60" width="9" height="13" rx="4" fill="#FFB6C1"/>
  </g>
  <!-- Pig 2 -->
  <g transform="translate(325, 250)">
    <ellipse cx="25" cy="45" rx="20" ry="18" fill="#FFB6C1"/>
    <!-- Overalls -->
    <rect x="10" y="34" width="30" height="26" rx="3" fill="#64B5F6"/>
    <circle cx="25" cy="22" r="17" fill="#FFB6C1"/>
    <ellipse cx="13" cy="9" rx="7" ry="9" fill="#FFB6C1" stroke="#FF9CAD" stroke-width="1"/>
    <ellipse cx="37" cy="9" rx="7" ry="9" fill="#FFB6C1" stroke="#FF9CAD" stroke-width="1"/>
    <circle cx="18" cy="20" r="2.5" fill="#333"/>
    <circle cx="32" cy="20" r="2.5" fill="#333"/>
    <circle cx="19" cy="19" r="1" fill="#fff"/>
    <circle cx="33" cy="19" r="1" fill="#fff"/>
    <ellipse cx="25" cy="28" rx="8" ry="6" fill="#FF9CAD"/>
    <circle cx="22" cy="28" r="1.5" fill="#E87D93"/>
    <circle cx="28" cy="28" r="1.5" fill="#E87D93"/>
    <path d="M17,33 Q25,39 33,33" fill="none" stroke="#E87D93" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M5,38 Q-5,20 0,10" fill="none" stroke="#FFB6C1" stroke-width="7" stroke-linecap="round"/>
    <path d="M45,38 Q55,20 50,10" fill="none" stroke="#FFB6C1" stroke-width="7" stroke-linecap="round"/>
    <rect x="12" y="60" width="9" height="13" rx="4" fill="#FFB6C1"/>
    <rect x="29" y="60" width="9" height="13" rx="4" fill="#FFB6C1"/>
  </g>
  <!-- Sparkles -->
  <g fill="#FFD54F">
    <polygon points="50,120 53,128 61,128 55,133 57,141 50,136 43,141 45,133 39,128 47,128"/>
    <polygon points="350,130 352,136 358,136 354,139 355,145 350,142 345,145 346,139 342,136 348,136"/>
    <polygon points="200,50 202,55 207,55 203,58 204,63 200,60 196,63 197,58 193,55 198,55"/>
  </g>
  <!-- Banner -->
  <text x="200" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#2E7D32" letter-spacing="3">HAPPY ENDING</text>
</svg>
