<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#2d1b3d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#sky)"/>
  <!-- Stars -->
  <g fill="#fff" opacity="0.4">
    <circle cx="100" cy="80" r="1.5"/><circle cx="200" cy="50" r="1"/><circle cx="350" cy="90" r="1.5"/>
    <circle cx="500" cy="40" r="1"/><circle cx="650" cy="70" r="1.5"/><circle cx="800" cy="45" r="1"/>
    <circle cx="950" cy="85" r="1.5"/><circle cx="1050" cy="55" r="1"/><circle cx="1150" cy="75" r="1.5"/>
    <circle cx="150" cy="130" r="1"/><circle cx="450" cy="120" r="1"/><circle cx="750" cy="110" r="1"/>
    <circle cx="1000" cy="130" r="1"/><circle cx="300" cy="30" r="1"/><circle cx="900" cy="30" r="1"/>
  </g>
  <!-- Moon -->
  <circle cx="1050" cy="100" r="50" fill="#FFE082" opacity="0.8"/>
  <circle cx="1065" cy="90" r="45" fill="url(#sky)"/>
  <!-- Ground -->
  <ellipse cx="600" cy="560" rx="650" ry="60" fill="#2E7D32" opacity="0.6"/>
  <!-- Straw House (left, small, broken) -->
  <g transform="translate(100, 300)" opacity="0.5">
    <rect x="0" y="40" width="100" height="80" fill="#F9E4B7" stroke="#D4A843" stroke-width="1"/>
    <polygon points="-15,45 50,0 115,45" fill="#E8C96A"/>
    <rect x="35" y="75" width="30" height="45" rx="15" fill="#C8A24E"/>
    <!-- Broken pieces -->
    <line x1="105" y1="50" x2="130" y2="40" stroke="#D4A843" stroke-width="2" opacity="0.6"/>
    <line x1="110" y1="70" x2="135" y2="65" stroke="#D4A843" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- Wood House (center-left, medium) -->
  <g transform="translate(350, 270)" opacity="0.6">
    <rect x="0" y="40" width="130" height="100" fill="#A1887F" stroke="#795548" stroke-width="1.5"/>
    <polygon points="-15,45 65,0 145,45" fill="#6D4C41"/>
    <rect x="45" y="90" width="40" height="50" rx="4" fill="#5D4037"/>
    <rect x="10" y="60" width="28" height="28" rx="2" fill="#B3E5FC" stroke="#795548" stroke-width="1"/>
    <rect x="92" y="60" width="28" height="28" rx="2" fill="#B3E5FC" stroke="#795548" stroke-width="1"/>
  </g>
  <!-- Brick House (right, large, glowing) -->
  <g transform="translate(650, 200)">
    <!-- Glow -->
    <ellipse cx="150" cy="200" rx="200" ry="100" fill="#E57373" opacity="0.08"/>
    <!-- House -->
    <rect x="0" y="60" width="300" height="200" rx="2" fill="#E57373"/>
    <!-- Brick pattern -->
    <g stroke="#C62828" stroke-width="0.6" opacity="0.4">
      <line x1="0" y1="80" x2="300" y2="80"/>
      <line x1="0" y1="100" x2="300" y2="100"/>
      <line x1="0" y1="120" x2="300" y2="120"/>
      <line x1="0" y1="140" x2="300" y2="140"/>
      <line x1="0" y1="160" x2="300" y2="160"/>
      <line x1="0" y1="180" x2="300" y2="180"/>
      <line x1="0" y1="200" x2="300" y2="200"/>
      <line x1="0" y1="220" x2="300" y2="220"/>
      <line x1="0" y1="240" x2="300" y2="240"/>
      <line x1="50" y1="60" x2="50" y2="80"/>
      <line x1="100" y1="60" x2="100" y2="80"/>
      <line x1="150" y1="60" x2="150" y2="80"/>
      <line x1="200" y1="60" x2="200" y2="80"/>
      <line x1="250" y1="60" x2="250" y2="80"/>
      <line x1="25" y1="80" x2="25" y2="100"/>
      <line x1="75" y1="80" x2="75" y2="100"/>
      <line x1="125" y1="80" x2="125" y2="100"/>
      <line x1="175" y1="80" x2="175" y2="100"/>
      <line x1="225" y1="80" x2="225" y2="100"/>
      <line x1="275" y1="80" x2="275" y2="100"/>
    </g>
    <!-- Roof -->
    <polygon points="-30,65 150,0 330,65" fill="#B71C1C" stroke="#880E0E" stroke-width="2"/>
    <!-- Chimney -->
    <rect x="230" y="10" width="35" height="45" rx="2" fill="#C62828"/>
    <circle cx="247" cy="0" r="8" fill="#BDBDBD" opacity="0.3"/>
    <circle cx="255" cy="-12" r="10" fill="#BDBDBD" opacity="0.2"/>
    <!-- Door -->
    <rect x="120" y="180" width="60" height="80" rx="30" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
    <circle cx="168" cy="222" r="5" fill="#FFD54F"/>
    <!-- Windows with warm light -->
    <rect x="25" y="110" width="55" height="50" rx="4" fill="#FFF9C4" stroke="#5D4037" stroke-width="2"/>
    <line x1="52.5" y1="110" x2="52.5" y2="160" stroke="#5D4037" stroke-width="1.5"/>
    <line x1="25" y1="135" x2="80" y2="135" stroke="#5D4037" stroke-width="1.5"/>
    <rect x="220" y="110" width="55" height="50" rx="4" fill="#FFF9C4" stroke="#5D4037" stroke-width="2"/>
    <line x1="247.5" y1="110" x2="247.5" y2="160" stroke="#5D4037" stroke-width="1.5"/>
    <line x1="220" y1="135" x2="275" y2="135" stroke="#5D4037" stroke-width="1.5"/>
    <!-- Window glow -->
    <rect x="27" y="112" width="51" height="46" rx="3" fill="#FFE082" opacity="0.3"/>
    <rect x="222" y="112" width="51" height="46" rx="3" fill="#FFE082" opacity="0.3"/>
  </g>
  <!-- Three pigs silhouette in front of brick house -->
  <g transform="translate(720, 430)">
    <!-- Pig 1 -->
    <ellipse cx="30" cy="40" rx="18" ry="16" fill="#FFB6C1"/>
    <circle cx="30" cy="18" r="15" fill="#FFB6C1"/>
    <ellipse cx="20" cy="7" rx="6" ry="8" fill="#FFB6C1"/>
    <ellipse cx="40" cy="7" rx="6" ry="8" fill="#FFB6C1"/>
    <circle cx="24" cy="16" r="2" fill="#333"/>
    <circle cx="36" cy="16" r="2" fill="#333"/>
    <ellipse cx="30" cy="24" rx="7" ry="5" fill="#FF9CAD"/>
    <circle cx="27" cy="24" r="1.5" fill="#E87D93"/>
    <circle cx="33" cy="24" r="1.5" fill="#E87D93"/>
    <path d="M22,28 Q30,33 38,28" fill="none" stroke="#E87D93" stroke-width="1.5"/>
    <rect x="18" y="53" width="8" height="12" rx="4" fill="#FFB6C1"/>
    <rect x="34" y="53" width="8" height="12" rx="4" fill="#FFB6C1"/>
  </g>
  <g transform="translate(790, 420)">
    <!-- Pig 2 (slightly bigger) -->
    <ellipse cx="30" cy="42" rx="20" ry="18" fill="#FFB6C1"/>
    <rect x="14" y="32" width="32" height="24" rx="3" fill="#64B5F6"/>
    <circle cx="30" cy="18" r="16" fill="#FFB6C1"/>
    <ellipse cx="19" cy="6" rx="6" ry="8" fill="#FFB6C1"/>
    <ellipse cx="41" cy="6" rx="6" ry="8" fill="#FFB6C1"/>
    <circle cx="24" cy="16" r="2" fill="#333"/>
    <circle cx="36" cy="16" r="2" fill="#333"/>
    <ellipse cx="30" cy="24" rx="7" ry="5" fill="#FF9CAD"/>
    <circle cx="27" cy="24" r="1.5" fill="#E87D93"/>
    <circle cx="33" cy="24" r="1.5" fill="#E87D93"/>
    <path d="M22,28 Q30,33 38,28" fill="none" stroke="#E87D93" stroke-width="1.5"/>
    <rect x="17" y="57" width="9" height="13" rx="4" fill="#FFB6C1"/>
    <rect x="34" y="57" width="9" height="13" rx="4" fill="#FFB6C1"/>
  </g>
  <g transform="translate(860, 425)">
    <!-- Pig 3 (with crown) -->
    <ellipse cx="30" cy="42" rx="20" ry="18" fill="#FFB6C1"/>
    <circle cx="30" cy="18" r="16" fill="#FFB6C1"/>
    <!-- Crown -->
    <polygon points="16,6 20,14 24,4 28,14 32,2 36,14 40,4 44,14" fill="#FFD54F" stroke="#FFA000" stroke-width="0.5"/>
    <ellipse cx="19" cy="6" rx="6" ry="8" fill="#FFB6C1"/>
    <ellipse cx="41" cy="6" rx="6" ry="8" fill="#FFB6C1"/>
    <circle cx="24" cy="16" r="2" fill="#333"/>
    <circle cx="36" cy="16" r="2" fill="#333"/>
    <ellipse cx="30" cy="24" rx="7" ry="5" fill="#FF9CAD"/>
    <circle cx="27" cy="24" r="1.5" fill="#E87D93"/>
    <circle cx="33" cy="24" r="1.5" fill="#E87D93"/>
    <path d="M22,28 Q30,33 38,28" fill="none" stroke="#E87D93" stroke-width="1.5"/>
    <rect x="17" y="57" width="9" height="13" rx="4" fill="#FFB6C1"/>
    <rect x="34" y="57" width="9" height="13" rx="4" fill="#FFB6C1"/>
  </g>
  <!-- Path/road -->
  <path d="M0,560 Q300,530 600,540 Q900,550 1200,530" fill="none" stroke="#4E342E" stroke-width="3" opacity="0.3"/>
</svg>
